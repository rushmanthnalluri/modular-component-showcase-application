apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-gateway
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.gateway.servicePort }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.servicePort }}
          livenessProbe:
            httpGet:
              path: /livez
              port: {{ .Values.gateway.servicePort }}
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
spec:
  selector:
    app: {{ .Release.Name }}-gateway
  ports:
    - port: {{ .Values.gateway.servicePort }}
      targetPort: {{ .Values.gateway.servicePort }}
