<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        const redirect = sessionStorage.getItem("spa-redirect");
        if (!redirect) {
          return;
        }

        sessionStorage.removeItem("spa-redirect");
        if (redirect.startsWith("/") && redirect !== window.location.pathname + window.location.search + window.location.hash) {
          window.history.replaceState(null, "", redirect);
        }
      })();
    </script>
    <title>Modular Component Showcase</title>
    <meta
      name="description"
      content="Discover, preview, and reuse production-ready React UI components with searchable categories and code snippets."
    />
    <meta
      name="keywords"
      content="react components, ui library, reusable components, frontend showcase, component catalog, web development"
    />
    <meta name="author" content="Modular Component Showcase Team" />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Modular Component Showcase" />
    <meta property="og:title" content="Modular Component Showcase" />
    <meta
      property="og:description"
      content="Find and use reusable React components with categorized browsing and code previews."
    />
    <meta property="og:url" content="https://rushmanthnalluri.github.io/modular-component-showcase-application/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Modular Component Showcase" />
    <meta
      name="twitter:description"
      content="A global-ready component discovery app for frontend developers."
    />
    <link rel="canonical" href="https://rushmanthnalluri.github.io/modular-component-showcase-application/" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Modular Component Showcase",
        "url": "https://rushmanthnalluri.github.io/modular-component-showcase-application/",
        "description": "A searchable catalog of reusable React components for developers.",
        "inLanguage": "en"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
