<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        const redirect = sessionStorage.getItem("spa-redirect");
        if (!redirect) {
          return;
        }

        sessionStorage.removeItem("spa-redirect");
        if (redirect.startsWith("/") && redirect !== window.location.pathname + window.location.search + window.location.hash) {
          window.history.replaceState(null, "", redirect);
        }
      })();
    </script>
    <title>Modular Component Showcase</title>
    <meta
      name="description"
      content="Reusable React component showcase for internal product development."
    />
    <meta
      name="keywords"
      content="react components, ui library, modular components, internal showcase"
    />
    <meta name="author" content="Modular Component Showcase Team" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
