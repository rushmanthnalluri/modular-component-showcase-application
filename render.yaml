services:
  - type: web
    name: modular-component-showcase-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: modular-component-showcase-gateway
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GATEWAY_URL
        fromService:
          type: web
          name: modular-component-showcase-gateway
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: modular-component-showcase-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_USE_GATEWAY
        value: true
      - key: VITE_APP_NAME
        value: Modular Component Showcase Application

  - type: web
    name: modular-component-showcase-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://rushmanthnalluri.github.io,https://modular-component-showcase-application-222h.onrender.com,https://modular-component-showcase-application-ve5e.onrender.com
      - key: JWT_ISSUER
        value: modular-component-showcase
      - key: JWT_AUDIENCE
        value: modular-component-showcase-clients
      - key: ALLOW_MEMORY_FALLBACK
        value: false
      - key: SQL_AUTO_MIGRATE
        value: true
      - key: SEED_SHOWCASE_ON_START
        value: true
      - key: PGSSL
        value: true
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: modular-component-showcase-gateway
    runtime: python
    rootDir: gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8000
      - key: BACKEND_URL
        fromService:
          type: web
          name: modular-component-showcase-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SPRING_SERVICE_URL
        fromService:
          type: web
          name: modular-component-showcase-spring-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: modular-component-showcase-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SQL_SERVICE_URL
        sync: false
      - key: REQUEST_TIMEOUT_SECONDS
        value: 20
      - key: REQUEST_MAX_RETRIES
        value: 2
      - key: JWT_ISSUER
        value: modular-component-showcase
      - key: JWT_AUDIENCE
        value: modular-component-showcase-clients
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false

  - type: web
    name: modular-component-showcase-spring-service
    runtime: docker
    rootDir: spring-service
    dockerContext: ./spring-service
    dockerfilePath: ./spring-service/Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        sync: false
      - key: SPRING_JWT_SECRET
        sync: false
      - key: SPRING_ALLOWED_ORIGINS
        value: https://rushmanthnalluri.github.io,https://modular-component-showcase-application-222h.onrender.com,https://modular-component-showcase-application-ve5e.onrender.com
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
        value: health,info,metrics,prometheus
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
