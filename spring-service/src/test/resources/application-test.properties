spring.datasource.url=jdbc:h2:mem:springservice;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.task.scheduling.enabled=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true
management.health.defaults.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

app.jwt.secret=test-secret-test-secret-test-secret-1234
app.jwt.expiration-ms=3600000
app.allowed-origins=http://localhost:8080,http://localhost:5173,http://localhost:8000

logging.level.root=WARN
logging.level.com.modularshowcase=INFO
