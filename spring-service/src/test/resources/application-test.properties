spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/test_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.task.scheduling.enabled=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true
management.health.defaults.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

app.jwt.secret=test-secret-test-secret-test-secret-1234
app.jwt.expiration-ms=3600000
app.allowed-origins=http://localhost:8080,http://localhost:5173,http://localhost:8000

logging.level.root=WARN
logging.level.com.modularshowcase=INFO
