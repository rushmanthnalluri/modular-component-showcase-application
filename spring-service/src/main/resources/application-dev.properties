# ─── Dev Profile ────────────────────────────────────────────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=dev  (default)

# Show SQL in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Detailed health in dev
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,mappings

# Less strict CORS in dev
app.allowed-origins=http://localhost:8080,http://localhost:5173,http://localhost:8000,http://127.0.0.1:5173

logging.level.com.modularshowcase=DEBUG
logging.level.org.springframework.security=DEBUG
