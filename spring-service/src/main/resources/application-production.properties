# ─── Production Profile ──────────────────────────────────────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=production
# All secrets must be provided via environment variables.

# Suppress SQL details in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Health: only show details to authorized callers
management.endpoint.health.show-details=when-authorized

# Restrict actuator to internal access (set via load-balancer/gateway rules)
# management.server.port=8090  # Uncomment to bind actuator to separate port

# Production CORS — set SPRING_ALLOWED_ORIGINS env var
# app.allowed-origins=https://your-frontend.onrender.com

logging.level.root=WARN
logging.level.com.modularshowcase=INFO
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health,info,metrics,prometheus
