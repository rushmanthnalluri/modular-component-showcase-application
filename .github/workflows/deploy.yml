name: Deployment Verification

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config > /dev/null
      - name: Validate Kubernetes manifests
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint
          yamllint k8s
      - name: Validate Helm chart
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint deploy/helm/modular-showcase
      - name: Build frontend image
        run: docker build -t modular-showcase-frontend:verify ./frontend
      - name: Build backend image
        run: docker build -t modular-showcase-backend:verify ./backend
      - name: Build gateway image
        run: docker build -t modular-showcase-gateway:verify ./gateway
      - name: Build spring-service image
        run: docker build -t modular-showcase-spring:verify ./spring-service
