name: Security Scans

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

env:
  # Set to true to fail CI when Trivy finds HIGH/CRITICAL issues.
  FAIL_ON_TRIVY_FINDINGS: true

jobs:
  filesystem-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy filesystem scan
        id: trivy_fs_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: sarif
          output: ${{ runner.temp }}/trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy filesystem SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/trivy-fs.sarif

      - name: Fail on Trivy filesystem findings
        if: always() && env.FAIL_ON_TRIVY_FINDINGS == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.trivy_fs_scan.outcome }}" != "success" ]]; then
            exit 1
          fi

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build --pull -f backend/Dockerfile -t modular-showcase-backend:scan backend

      - name: Trivy image scan
        id: trivy_image_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: modular-showcase-backend:scan
          format: sarif
          output: ${{ runner.temp }}/trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy image SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/trivy-image.sarif

      - name: Fail on Trivy image findings
        if: always() && env.FAIL_ON_TRIVY_FINDINGS == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.trivy_image_scan.outcome }}" != "success" ]]; then
            exit 1
          fi

  maven-dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP dependency check
        working-directory: spring-service
        run: mvn -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
