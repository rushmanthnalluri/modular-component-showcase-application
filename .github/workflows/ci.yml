name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci --workspaces

      - name: Lint
        run: npm run lint --workspace frontend

      - name: Test
        run: npm run test --workspace backend

      - name: Backend coverage
        run: node --test --experimental-test-coverage backend/src/tests/*.test.js

      - name: Frontend Unit Tests
        run: npm run test:ui --workspace frontend

      - name: Frontend coverage
        run: npm run test:ui --workspace frontend -- --coverage

      - name: Build
        run: npm run build --workspace frontend

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Validate Docker Compose
        run: docker compose config > /dev/null

  contract-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: pip install pyyaml

      - name: Validate OpenAPI contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          expected = {
            "openapi-backend.yaml": ["/components", "/vector/search/hybrid", "/reconciliation/status"],
            "openapi-gateway.yaml": ["/health", "/readyz", "/livez", "/api/{full_path}"],
            "openapi-spring.yaml": ["/health", "/auth/token", "/components", "/components/search"],
          }
          root = Path("contracts")
          for filename, required_paths in expected.items():
            payload = yaml.safe_load((root / filename).read_text(encoding="utf-8"))
            paths = payload.get("paths", {})
            for path in required_paths:
              assert path in paths, f"{filename} missing {path}"
          print("OpenAPI contracts validated")
          PY

  gateway-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install gateway dependencies
        run: pip install -r requirements.txt

      - name: Run gateway tests
        run: pytest -q

  spring-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-service
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run Spring tests
        run: ./mvnw -B test

      - name: Verify Spring package
        run: ./mvnw -B -DskipTests package

      - name: JaCoCo report
        run: ./mvnw -B jacoco:report

      - name: Create Spring coverage summary
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          report_path = Path("target/site/jacoco/jacoco.xml")
          tree = ET.parse(report_path)
          counters = {counter.attrib["type"]: counter.attrib for counter in tree.getroot().iter("counter")}
          line = counters["LINE"]
          covered = int(line["covered"])
          missed = int(line["missed"])
          ratio = covered / (covered + missed) if covered + missed else 0
          summary = Path("target/site/jacoco/coverage-summary.txt")
          summary.write_text(
              f"LINE_COVERED={covered}\nLINE_MISSED={missed}\nLINE_RATIO={ratio:.4f}\n",
              encoding="utf-8",
          )
          print(summary.read_text(encoding="utf-8"))
          PY

      - name: Start Spring runtime with test profile
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:springruntime;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_FLYWAY_ENABLED: "false"
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.H2Dialect
          SPRING_SQL_INIT_MODE: never
          SPRING_TASK_SCHEDULING_ENABLED: "false"
          SPRING_JWT_SECRET: test-secret-test-secret-test-secret-1234
        run: |
          ./mvnw -q -Dspring-boot.run.useTestClasspath=true spring-boot:run > spring-runtime.log 2>&1 &
          echo $! > spring.pid

      - name: Validate Spring runtime OpenAPI and actuator smoke
        run: |
          pip install pyyaml
          python ../tests/verification/validate_spring_runtime.py

      - name: Stop Spring runtime
        if: always()
        run: |
          if [ -f spring.pid ]; then
            kill "$(cat spring.pid)" || true
          fi

      - name: Upload Spring JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-jacoco-report
          path: spring-service/target/site/jacoco

      - name: Upload Spring runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-runtime-log
          path: spring-service/spring-runtime.log

      - name: Upload Spring coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-coverage-summary
          path: spring-service/target/site/jacoco/coverage-summary.txt

  deployment-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install pytest pyyaml

      - name: Validate Docker Compose
        run: docker compose config > /dev/null

      - name: Run deployment smoke tests
        run: pytest tests/verification/test_deployment_smoke.py -q

  evidence-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install pytest pyyaml

      - name: Run proof-pack verification tests
        run: pytest tests/verification/test_contract_parity.py tests/verification/test_evidence_pack.py -q

      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-proof-pack
          path: docs

      - name: Upload screenshot placeholder artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-placeholders
          path: docs/screenshots

  release-readiness:
    runs-on: ubuntu-latest
    needs:
      - quality
      - contract-validation
      - gateway-tests
      - spring-tests
      - deployment-smoke
      - evidence-pack
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Final release readiness gate
        run: |
          test -f docs/spring-verification-report.md
          test -f docs/atlas-live-verification.md
          test -f docs/database-proof-pack.md
          test -f docs/vector-proof-pack.md
          test -f docs/api-proof-pack.md
          test -f docs/multi-framework-proof-pack.md
          test -f docs/microservices-proof-pack.md
          test -f docs/deployment-proof-pack.md
          echo "Release readiness gate passed"
