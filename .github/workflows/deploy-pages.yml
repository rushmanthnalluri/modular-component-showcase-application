name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Optional VITE_API_BASE_URL override (example: https://modular-showcase-api.onrender.com/api)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve production API URL
        env:
          DISPATCH_API_BASE_URL: ${{ github.event.inputs.api_base_url }}
        run: |
          if [ -n "$DISPATCH_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL=$DISPATCH_API_BASE_URL" >> "$GITHUB_ENV"
            echo "Using manual dispatch VITE_API_BASE_URL=$DISPATCH_API_BASE_URL"
          else
            FALLBACK_API_BASE_URL="https://modular-component-showcase-application.onrender.com/api"
            echo "VITE_API_BASE_URL=$FALLBACK_API_BASE_URL" >> "$GITHUB_ENV"
            echo "Using fallback VITE_API_BASE_URL=$FALLBACK_API_BASE_URL"
          fi

      - name: Build app
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
