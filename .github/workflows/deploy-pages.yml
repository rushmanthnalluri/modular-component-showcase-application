name: GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages-availability:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check GitHub Pages availability
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.setOutput('enabled', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.warning('GitHub Pages is not configured for this repository. Skipping deploy jobs.');
                core.setOutput('enabled', 'false');
              } else {
                throw error;
              }
            }

  build:
    runs-on: ubuntu-latest
    needs: pages-availability
    if: needs.pages-availability.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://modular-component-showcase-application-ve5e.onrender.com
          VITE_GATEWAY_URL: https://modular-component-showcase-application-ve5e.onrender.com
          VITE_BACKEND_URL: https://modular-component-showcase-application.onrender.com
          VITE_USE_GATEWAY: "true"
        run: |
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: [pages-availability, build]
    if: needs.pages-availability.outputs.enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
