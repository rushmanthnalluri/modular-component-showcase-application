# ─── Application Identity ───────────────────────────────────────────────────
spring.application.name=${SPRING_APP_NAME:springboot}
server.port=${PORT:${SPRING_SERVICE_PORT:8081}}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── DataSource ─────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/modular_component_showcase_application}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ─── Caching (Caffeine) ─────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m
spring.cache.cache-names=users,components,reviews,ratings

# ─── Actuator — expose all endpoints ────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.server.port=${PORT:${SPRING_SERVICE_PORT:8081}}
management.endpoint.metrics.access=read-only
management.endpoint.prometheus.access=read-only
management.endpoint.caches.access=read-only
management.health.defaults.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Prometheus scrape endpoint accessible without auth
management.endpoints.web.cors.allowed-origins=${SPRING_ACTUATOR_ALLOWED_ORIGINS:${app.allowed-origins}}
management.endpoints.web.base-path=/actuator

# Application info shown in /actuator/info
management.endpoint.env.access=read-only
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=${spring.application.name}
info.app.version=0.1.0
info.app.description=Modular Component Showcase Spring Boot Microservice
info.app.contact=https://github.com/rushmanthnalluri

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.root=${SPRING_LOG_LEVEL:INFO}
logging.level.com.modularshowcase=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n
app.maintenance.fixed-delay-ms=${SPRING_MAINTENANCE_FIXED_DELAY_MS:300000}

# ─── OpenAPI / Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ─── Security / JWT ──────────────────────────────────────────────────────────
app.jwt.secret=${SPRING_JWT_SECRET:dev-secret-dev-secret-dev-secret-1234}
app.jwt.expiration-ms=${SPRING_JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${SPRING_JWT_REFRESH_EXPIRATION_MS:604800000}
app.allowed-origins=${SPRING_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://localhost:8000}
