services:
  postgres:
    image: postgres:16-alpine
    container_name: showcase-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modular_component_showcase_application
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/postgres_schema.sql:/docker-entrypoint-initdb.d/01-postgres_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modular_component_showcase_application"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: showcase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fedf.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    build:
      context: ./frontend
    container_name: showcase-frontend
    env_file:
      - ./frontend/.env
    environment:
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL}
      VITE_USE_GATEWAY: ${VITE_USE_GATEWAY}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: showcase-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: ${PORT}
      MONGODB_URI: ${MONGODB_URI}
      DATABASE_URL: ${DATABASE_URL}
      SQL_AUTO_MIGRATE: ${SQL_AUTO_MIGRATE}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      NODE_ENV: ${NODE_ENV}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: showcase-gateway
    env_file:
      - ./gateway/.env
    environment:
      PORT: ${GATEWAY_PORT}
      BACKEND_URL: http://backend:5000
      SPRING_SERVICE_URL: http://spring-service:8081
      FRONTEND_URL: http://frontend:8080
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS}
      REQUEST_MAX_RETRIES: ${REQUEST_MAX_RETRIES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
      spring-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://127.0.0.1:8000/health\", timeout=5).raise_for_status()'"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: showcase-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  spring-service:
    build:
      context: ./spring-service
    container_name: showcase-spring-service
    env_file:
      - ./spring-service/.env
    environment:
      PORT: ${PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/modular_component_showcase_application
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JWT_SECRET: ${SPRING_JWT_SECRET}
      SPRING_ALLOWED_ORIGINS: ${SPRING_ALLOWED_ORIGINS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: showcase-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: showcase-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_started
      gateway:
        condition: service_started
      spring-service:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: showcase-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana-dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: showcase-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  mongo_data:
