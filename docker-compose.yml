x-frontend-default-env: &frontend-default-env
  VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
  VITE_USE_GATEWAY: ${VITE_USE_GATEWAY:-true}

x-backend-default-env: &backend-default-env
  PORT: ${PORT:-5000}
  NODE_ENV: ${NODE_ENV:-development}
  MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/modular_components}
  DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/modular_component_showcase_application}
  SQL_AUTO_MIGRATE: ${SQL_AUTO_MIGRATE:-true}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:8080,http://localhost:5173}
  PGVECTOR_ENABLED: ${PGVECTOR_ENABLED:-true}
  PGVECTOR_DIMENSIONS: ${PGVECTOR_DIMENSIONS:-128}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}

x-gateway-default-env: &gateway-default-env
  BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
  SPRING_SERVICE_URL: ${SPRING_SERVICE_URL:-http://spring-service:8081}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  SPRING_JWT_SECRET: ${SPRING_JWT_SECRET:?SPRING_JWT_SECRET is required}
  GATEWAY_PORT: ${GATEWAY_PORT:-8000}
  REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-20}
  REQUEST_MAX_RETRIES: ${REQUEST_MAX_RETRIES:-2}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}

x-spring-default-env: &spring-default-env
  PORT: ${SPRING_SERVICE_PORT:-8081}
  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/modular_component_showcase_application}
  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
  SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
  SPRING_JWT_SECRET: ${SPRING_JWT_SECRET:?SPRING_JWT_SECRET is required}
  SPRING_JWT_REFRESH_EXPIRATION_MS: ${SPRING_JWT_REFRESH_EXPIRATION_MS:-604800000}
  SPRING_ALLOWED_ORIGINS: ${SPRING_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:8000}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: showcase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-modular_component_showcase_application}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/postgres_schema.sql:/docker-entrypoint-initdb.d/01-postgres_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modular_component_showcase_application"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - modular_net

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: showcase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fedf.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - modular_net

  frontend:
    build:
      context: ./frontend
    container_name: showcase-frontend
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      <<: *frontend-default-env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - modular_net

  backend:
    build:
      context: ./backend
    container_name: showcase-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      <<: *backend-default-env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - modular_net

  gateway:
    build:
      context: ./gateway
    container_name: showcase-gateway
    env_file:
      - path: ./gateway/.env
        required: false
    environment:
      <<: *gateway-default-env
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
      spring-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://127.0.0.1:8000/health\", timeout=5).raise_for_status()'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - modular_net

  mongo:
    image: mongo:7
    container_name: showcase-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - modular_net

  spring-service:
    build:
      context: ./spring-service
    container_name: showcase-spring-service
    env_file:
      - path: ./spring-service/.env
        required: false
    environment:
      <<: *spring-default-env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - modular_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: showcase-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - modular_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: showcase-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_healthy
      spring-service:
        condition: service_healthy
    networks:
      - modular_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: showcase-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana-dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - modular_net

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: showcase-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped
    networks:
      - modular_net

volumes:
  postgres_data:
  pgadmin_data:
  mongo_data:

networks:
  modular_net:
    driver: bridge
