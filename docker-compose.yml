services:
  postgres:
    image: postgres:16-alpine
    container_name: showcase-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modular_components
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/postgres_schema.sql:/docker-entrypoint-initdb.d/01-postgres_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modular_components"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: showcase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fedf.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    build:
      context: ./frontend
    container_name: showcase-frontend
    environment:
      VITE_GATEWAY_URL: http://localhost:8000
      VITE_USE_GATEWAY: "true"
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
      gateway:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
    container_name: showcase-backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/modular_components
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/modular_components
      SQL_AUTO_MIGRATE: "true"
      JWT_SECRET: development-secret
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost:8080
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
    container_name: showcase-gateway
    environment:
      PORT: 8000
      BACKEND_URL: http://backend:5000
      FRONTEND_URL: http://localhost:8080
      REQUEST_TIMEOUT_SECONDS: 20
      REQUEST_MAX_RETRIES: 2
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: showcase-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  pgadmin_data:
  mongo_data:
