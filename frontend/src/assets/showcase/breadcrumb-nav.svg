<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">Breadcrumb Navigation Component</title>
  <desc id="desc">Breadcrumb trail with current page emphasis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="420" height="260" rx="24" fill="url(#bg)" />
  <rect x="56" y="98" width="308" height="64" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5" />
  <text x="80" y="137" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="14">Home</text>
  <text x="126" y="137" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">/</text>
  <text x="142" y="137" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="14">Components</text>
  <text x="228" y="137" fill="#475569" font-family="Segoe UI, sans-serif" font-size="14">/</text>
  <text x="244" y="137" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">Navigation</text>
</svg>
